services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: smart-agent-dev
    restart: unless-stopped
    privileged: true
    network_mode: host

    volumes:
      - ./.env:/app/.env:rw
      - ./config.json:/app/config.json:rw
      - ./gpio_mapping.json:/app/gpio_mapping.json:rw
      - ./logs:/app/logs:rw
      - /var/run/docker.sock:/var/run/docker.sock

    environment:
      LOG_DIR: /app/logs

    env_file:
      - .env
